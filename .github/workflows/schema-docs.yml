name: Update Schema Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "fastapi_code_generator/config.py"
      - "fastapi_code_generator/_types/**"
      - "tests/data/openapi/**"
      - "scripts/build_schema_docs.py"
      - "docs/supported_formats.md"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/schema-docs.yml"

permissions:
  contents: read

jobs:
  update-schema-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e schema-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Build schema docs
        run: .tox/schema-docs/bin/python scripts/build_schema_docs.py --check
