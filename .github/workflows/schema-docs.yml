name: Update Schema Docs

on:
  push:
    branches: [main]
    paths:
      - "fastapi_code_generator/config.py"
      - "fastapi_code_generator/_types/**"
      - "scripts/build_schema_docs.py"
      - "docs/supported_formats.md"
      - "tox.ini"
      - ".github/workflows/schema-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "fastapi_code_generator/config.py"
      - "fastapi_code_generator/_types/**"
      - "scripts/build_schema_docs.py"
      - "docs/supported_formats.md"
      - "tox.ini"
      - ".github/workflows/schema-docs.yml"

concurrency:
  group: docs-autoupdate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-schema-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: pat-preflight
        run: |
          if [ -n "${{ secrets.PAT }}" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: |
          steps.pat-preflight.outputs.has_pat == 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.PAT }}
      - id: preflight
        run: |
          if [ -f scripts/build_schema_docs.py ] && grep -q '^\[testenv:schema-docs\]' tox.ini; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install the latest version of uv
        if: steps.preflight.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        if: steps.preflight.outputs.enabled == 'true'
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        if: steps.preflight.outputs.enabled == 'true'
        run: tox run -vv --notest --skip-missing-interpreters false -e schema-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Build schema docs
        if: steps.preflight.outputs.enabled == 'true'
        run: .tox/schema-docs/bin/python scripts/build_schema_docs.py
      - name: Commit and push if changed
        if: |
          steps.pat-preflight.outputs.has_pat == 'true' &&
          steps.preflight.outputs.enabled == 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/supported_formats.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update schema feature documentation

          Generated by GitHub Actions"
            git pull --rebase origin "$BRANCH_REF"
            git push
          fi
      - name: Skip auto-update when PAT is unavailable
        if: |
          steps.preflight.outputs.enabled == 'true' &&
          steps.pat-preflight.outputs.has_pat != 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        run: echo "PAT is required for schema docs auto-update pushes; skipping write-back."
      - name: Skip when schema docs support is not present
        if: steps.preflight.outputs.enabled != 'true'
        run: echo "No schema docs generator is defined for this repository."
