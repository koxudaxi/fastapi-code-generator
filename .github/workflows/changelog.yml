name: Update CHANGELOG

on:
  release:
    types: [published]

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          token: ${{ github.token }}

      - name: Get release info and update CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          DATE=$(gh release view "$TAG" --json publishedAt --jq '.publishedAt | split("T")[0]')
          BODY=$(gh release view "$TAG" --json body --jq '.body // ""')

          {
            echo "## [$TAG](https://github.com/$REPOSITORY/releases/tag/$TAG) - $DATE"
            echo ""
            printf '%s\n' "$BODY"
            echo ""
            echo "---"
            echo ""
          } > new_entry.md

          if [ ! -f CHANGELOG.md ]; then
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project are documented in this file."
              echo "This changelog is automatically generated from GitHub Releases."
              echo ""
              echo "---"
              echo ""
            } > CHANGELOG.md
          fi

          awk '
            /^```/ { in_codeblock = !in_codeblock }
            /^---$/ && !in_codeblock && !found { found = 1; print > "header.md"; next }
            !found { print > "header.md"; next }
            { print > "old_entries.md" }
          ' CHANGELOG.md
          touch old_entries.md
          cat header.md new_entry.md old_entries.md > CHANGELOG.md
          rm -f header.md new_entry.md old_entries.md

      - name: Commit and push
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for $TAG"
          git push
