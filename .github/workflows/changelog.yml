name: Update CHANGELOG

on:
  release:
    types: [published]

jobs:
  build-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.patch.outputs.has_changes }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          persist-credentials: false

      - name: Get release info and update CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          DATE=$(gh release view "$TAG" --json publishedAt --jq '.publishedAt | split("T")[0]')
          BODY=$(gh release view "$TAG" --json body --jq '.body // ""')

          {
            echo "## [$TAG](https://github.com/${{ github.repository }}/releases/tag/$TAG) - $DATE"
            echo ""
            printf '%s\n' "$BODY"
            echo ""
            echo "---"
            echo ""
          } > new_entry.md

          if [ ! -f CHANGELOG.md ]; then
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project are documented in this file."
              echo "This changelog is automatically generated from GitHub Releases."
              echo ""
              echo "---"
              echo ""
            } > CHANGELOG.md
          fi

          awk '/^---$/ && !found {found=1; print > "header.md"; next} !found {print > "header.md"} found {print > "old_entries.md"}' CHANGELOG.md
          touch old_entries.md
          cat header.md new_entry.md old_entries.md > CHANGELOG.md
          rm -f header.md new_entry.md old_entries.md

      - name: Create changelog patch
        id: patch
        env:
          PATCH_PATH: ${{ runner.temp }}/changelog.patch
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --binary -- CHANGELOG.md > "$PATCH_PATH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload changelog patch
        if: steps.patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: changelog-patch
          path: ${{ runner.temp }}/changelog.patch
          if-no-files-found: error

  commit-changelog:
    needs: build-changelog
    if: needs.build-changelog.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Download changelog patch
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: changelog-patch
          path: ${{ runner.temp }}

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_PATH: ${{ runner.temp }}/changelog.patch
        run: |
          set -euo pipefail
          git apply --index --whitespace=nowarn "$PATCH_PATH"
          if git diff --staged --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update CHANGELOG.md for ${{ github.event.release.tag_name }}"
          git fetch origin main
          git rebase origin/main
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
