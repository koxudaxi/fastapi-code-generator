name: Docs

on:
  pull_request:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'fastapi-code-generator' }}
    steps:
      - uses: actions/checkout@v5
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Build site
        run: tox -e docs
      - name: Deploy Preview
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          env.CLOUDFLARE_API_TOKEN != '' &&
          env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=pr-${{ github.event.pull_request.number }}
      - name: Comment Preview URL on PR
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          env.CLOUDFLARE_API_TOKEN != '' &&
          env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: actions/github-script@v7
        with:
          script: |
            const projectName = '${{ env.CLOUDFLARE_PAGES_PROJECT }}';
            const previewUrl = `https://pr-${context.issue.number}.${projectName}.pages.dev`;
            const body = `📚 **Docs Preview:** ${previewUrl}`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existingComment = comments.data.find((comment) =>
              comment.body && comment.body.includes('Docs Preview:')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
      - name: Deploy Dev
        if: >
          github.event_name == 'push' &&
          env.CLOUDFLARE_API_TOKEN != '' &&
          env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=dev
      - name: Deploy Production
        if: >
          (github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
          env.CLOUDFLARE_API_TOKEN != '' &&
          env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}
            --branch=main
