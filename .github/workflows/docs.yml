name: Docs

on:
  pull_request:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    outputs:
      preview-enabled: ${{ steps.preview-preflight.outputs.enabled }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Build site
        run: tox -e docs
      - name: Compute preview preflight
        id: preview-preflight
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] &&
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ] &&
             [ -n "${CLOUDFLARE_API_TOKEN:-}" ] &&
             [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy Preview
        if: steps.preview-preflight.outputs.enabled == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'fastapi-code-generator' }}
            --branch=pr-${{ github.event.pull_request.number }}
      - name: Deploy Dev
        if: >
          github.event_name == 'push' &&
          secrets.CLOUDFLARE_API_TOKEN != '' &&
          secrets.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'fastapi-code-generator' }}
            --branch=dev
      - name: Deploy Production
        if: >
          (github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
          secrets.CLOUDFLARE_API_TOKEN != '' &&
          secrets.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'fastapi-code-generator' }}
            --branch=main

  comment-preview:
    needs: build-deploy
    if: needs.build-deploy.outputs.preview-enabled == 'true'
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Comment Preview URL on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const projectName = '${{ vars.CLOUDFLARE_PAGES_PROJECT || 'fastapi-code-generator' }}';
            const previewUrl = `https://pr-${context.issue.number}.${projectName}.pages.dev`;
            const body = `📚 **Docs Preview:** ${previewUrl}`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existingComment = comments.data.find((comment) =>
              comment.body && comment.body.includes('Docs Preview:')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
