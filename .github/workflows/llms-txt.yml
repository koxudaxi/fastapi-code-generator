name: Update llms.txt

on:
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "fastapi_code_generator/**"
      - "tests/main/**"
      - "tests/cli_doc/**"
      - "tests/data/openapi/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "scripts/build_schema_docs.py"
      - "docs/llms.txt"
      - "docs/llms-full.txt"
      - "zensical.toml"
      - "scripts/build_llms_txt.py"
      - ".github/workflows/llms-txt.yml"

permissions:
  contents: read

jobs:
  update-llms-txt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup README environment
        run: tox run -vv --notest --skip-missing-interpreters false -e readme
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Setup CLI docs environment
        run: tox run -vv --notest --skip-missing-interpreters false -e cli-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Setup schema docs environment
        run: tox run -vv --notest --skip-missing-interpreters false -e schema-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Setup llms.txt environment
        run: tox run -vv --notest --skip-missing-interpreters false -e llms-txt
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Update README
        run: .tox/readme/bin/python scripts/update_command_help_on_markdown.py --check
      - name: Collect CLI doc metadata
        run: .tox/cli-docs/bin/pytest --collect-cli-docs -p no:xdist -q
      - name: Build CLI docs
        run: .tox/cli-docs/bin/python scripts/build_cli_docs.py --check
      - name: Build prompt data
        run: .tox/cli-docs/bin/python scripts/build_prompt_data.py --output fastapi_code_generator/prompt_data.py --check
      - name: Build schema docs
        run: .tox/schema-docs/bin/python scripts/build_schema_docs.py --check
      - name: Build llms.txt
        run: .tox/llms-txt/bin/python scripts/build_llms_txt.py --check
