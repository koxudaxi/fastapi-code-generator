name: Update llms.txt

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "zensical.toml"
      - "scripts/build_llms_txt.py"
      - "tox.ini"
      - ".github/workflows/llms-txt.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "zensical.toml"
      - "scripts/build_llms_txt.py"
      - "tox.ini"
      - ".github/workflows/llms-txt.yml"
  pull_request_target:
    types: [labeled]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "zensical.toml"
      - "scripts/build_llms_txt.py"
      - "tox.ini"
      - ".github/workflows/llms-txt.yml"

permissions:
  contents: write

jobs:
  update-llms-txt:
    if: |
      github.event_name == 'push' ||
      !github.event.pull_request.head.repo.fork ||
      github.actor == 'koxudaxi' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'safe-to-fix' &&
       github.event.sender.login == 'koxudaxi')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: actions/checkout@v5
        if: github.event_name == 'push' || github.event_name == 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.PAT || github.token }}
      - id: preflight
        run: |
          if [ -f scripts/build_llms_txt.py ] && grep -q '^\[testenv:llms-txt\]' tox.ini; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install the latest version of uv
        if: steps.preflight.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        if: steps.preflight.outputs.enabled == 'true'
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        if: steps.preflight.outputs.enabled == 'true'
        run: tox run -vv --notest --skip-missing-interpreters false -e llms-txt
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Build llms.txt
        if: steps.preflight.outputs.enabled == 'true'
        run: .tox/llms-txt/bin/python scripts/build_llms_txt.py
      - name: Commit and push if changed
        if: |
          steps.preflight.outputs.enabled == 'true' &&
          (github.event_name == 'push' || github.event_name == 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/llms.txt docs/llms-full.txt
          git diff --staged --quiet || git commit -m "docs: update llms.txt files

          Generated by GitHub Actions"
          git push
      - name: Skip when llms.txt support is not present
        if: steps.preflight.outputs.enabled != 'true'
        run: echo "No llms.txt generator is defined for this repository."
