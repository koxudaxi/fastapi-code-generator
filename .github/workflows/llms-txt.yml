name: Update llms.txt

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "zensical.toml"
      - "scripts/build_llms_txt.py"
      - "tox.ini"
      - ".github/workflows/llms-txt.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "zensical.toml"
      - "scripts/build_llms_txt.py"
      - "tox.ini"
      - ".github/workflows/llms-txt.yml"

concurrency:
  group: docs-autoupdate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.preflight.outputs.enabled }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: preflight
        run: |
          if [ -f scripts/build_llms_txt.py ] && grep -q '^\[testenv:llms-txt\]' tox.ini; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install the latest version of uv
        if: steps.preflight.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        if: steps.preflight.outputs.enabled == 'true'
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        if: steps.preflight.outputs.enabled == 'true'
        run: tox run -vv --notest --skip-missing-interpreters false -e llms-txt
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Build llms.txt
        if: steps.preflight.outputs.enabled == 'true'
        run: .tox/llms-txt/bin/python scripts/build_llms_txt.py
      - name: Upload generated llms.txt
        if: |
          steps.preflight.outputs.enabled == 'true' &&
          github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: llms-txt-generated
          path: |
            docs/llms.txt
            docs/llms-full.txt
          retention-days: 1
      - name: Skip when llms.txt support is not present
        if: steps.preflight.outputs.enabled != 'true'
        run: echo "No llms.txt generator is defined for this repository."

  write-back:
    needs: build
    if: |
      needs.build.outputs.enabled == 'true' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false
      - name: Download generated llms.txt
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: llms-txt-generated
          path: docs
      - name: Commit and push if changed
        env:
          BRANCH_REF: ${{ github.ref_name }}
          PAT: ${{ secrets.PAT }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "PAT is required for llms.txt auto-update pushes; skipping write-back."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/llms.txt docs/llms-full.txt
          if ! git diff --staged --quiet; then
            git commit -m "docs: update llms.txt files

          Generated by GitHub Actions"
            # shellcheck disable=SC2016
            HELPER='!f() { printf "username=x-access-token\npassword=%s\n" "$PAT"; }; f'
            git -c credential.helper= -c "credential.helper=$HELPER" \
              pull --rebase "https://github.com/$REPOSITORY.git" "$BRANCH_REF"
            git -c credential.helper= -c "credential.helper=$HELPER" \
              push "https://github.com/$REPOSITORY.git" "HEAD:$BRANCH_REF"
          fi
