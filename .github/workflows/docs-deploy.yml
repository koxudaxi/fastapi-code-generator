name: Docs Deploy

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: true
        type: string
      deploy_branch:
        required: false
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    concurrency:
      group: docs-deploy-${{ inputs.deploy_branch || inputs.checkout_ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen --group docs
      - name: Update GitHub Action version in docs
        run: uv run python scripts/update_docs_version.py
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Build site
        run: uv run zensical build --clean
      - name: Deploy
        if: inputs.deploy_branch != ''
        env:
          DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'fastapi-code-generator' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site
            --project-name="$PROJECT_NAME"
            --branch="$DEPLOY_BRANCH"
