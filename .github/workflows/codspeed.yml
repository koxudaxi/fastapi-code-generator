name: codspeed-benchmarks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if [ -z "${{ secrets.CODSPEED_TOKEN }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f tests/main/test_performance.py ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! grep -q "benchmark" pyproject.toml; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

  benchmarks:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.2"
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Install dependencies
        run: uv sync --all-extras --group benchmark
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: .venv/bin/pytest tests/main/test_performance.py --codspeed
          mode: walltime
