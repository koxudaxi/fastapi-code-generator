name: Update README

on:
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/index.md"
      - "fastapi_code_generator/**"
      - "scripts/build_cli_docs.py"
      - "scripts/update_command_help_on_markdown.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/readme.yml"

permissions:
  contents: read

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e readme
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Update README
        run: .tox/readme/bin/python scripts/update_command_help_on_markdown.py
