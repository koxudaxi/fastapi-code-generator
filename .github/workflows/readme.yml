name: Update README

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/index.md"
      - "fastapi_code_generator/**"
      - "scripts/update_command_help_on_markdown.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/readme.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/index.md"
      - "fastapi_code_generator/**"
      - "scripts/update_command_help_on_markdown.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/readme.yml"

concurrency:
  group: docs-autoupdate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Update README snapshots
        run: tox -e readme
      - name: Upload generated snapshots
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: readme-generated
          path: |
            README.md
            docs/index.md
          retention-days: 1

  write-back:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false
      - name: Download generated snapshots
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: readme-generated
      - name: Commit and push if changed
        env:
          BRANCH_REF: ${{ github.ref_name }}
          PAT: ${{ secrets.PAT }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "PAT is required for README auto-update pushes; skipping write-back."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update command help snapshots

          Generated by GitHub Actions"
            # shellcheck disable=SC2016
            HELPER='!f() { printf "username=x-access-token\npassword=%s\n" "$PAT"; }; f'
            git -c credential.helper= -c "credential.helper=$HELPER" \
              pull --rebase "https://github.com/$REPOSITORY.git" "$BRANCH_REF"
            git -c credential.helper= -c "credential.helper=$HELPER" \
              push "https://github.com/$REPOSITORY.git" "HEAD:$BRANCH_REF"
          fi
