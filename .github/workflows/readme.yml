name: Update README

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/index.md"
      - "fastapi_code_generator/**"
      - "scripts/update_command_help_on_markdown.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/readme.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "docs/index.md"
      - "fastapi_code_generator/**"
      - "scripts/update_command_help_on_markdown.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/readme.yml"

concurrency:
  group: docs-autoupdate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        with:
          fetch-depth: 0
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.PAT || github.token }}
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Update README snapshots
        run: tox -e readme
      - name: Commit and push if changed
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update command help snapshots

          Generated by GitHub Actions"
            git pull --rebase origin "${{ github.event.pull_request.head.ref || github.ref_name }}"
            git push
          fi
