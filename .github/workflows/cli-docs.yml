name: Update CLI Docs

on:
  push:
    branches: [main]
    paths:
      - "fastapi_code_generator/**"
      - "tests/cli_doc/**"
      - "tests/main/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/cli-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "fastapi_code_generator/**"
      - "tests/cli_doc/**"
      - "tests/main/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/cli-docs.yml"

concurrency:
  group: docs-autoupdate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e cli-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Collect CLI doc metadata
        run: .tox/cli-docs/bin/pytest --collect-cli-docs -p no:xdist -q
      - name: Build CLI docs
        run: .tox/cli-docs/bin/python scripts/build_cli_docs.py
      - name: Build prompt data
        run: .tox/cli-docs/bin/python scripts/build_prompt_data.py --output fastapi_code_generator/prompt_data.py
      - name: Format generated prompt data
        run: uvx --from black==24.10.0 black --quiet fastapi_code_generator/prompt_data.py
      - name: Upload generated docs
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-docs-generated
          path: |
            docs/cli-reference.md
            fastapi_code_generator/prompt_data.py
          retention-days: 1

  write-back:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false
      - name: Download generated docs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-docs-generated
      - name: Commit and push if changed
        env:
          BRANCH_REF: ${{ github.ref_name }}
          PAT: ${{ secrets.PAT }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "PAT is required for CLI docs auto-update pushes; skipping write-back."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cli-reference.md fastapi_code_generator/prompt_data.py
          if ! git diff --staged --quiet; then
            git commit -m "docs: update CLI reference documentation

          Generated by GitHub Actions"
            # shellcheck disable=SC2016
            HELPER='!f() { printf "username=x-access-token\npassword=%s\n" "$PAT"; }; f'
            git -c credential.helper= -c "credential.helper=$HELPER" \
              pull --rebase "https://github.com/$REPOSITORY.git" "$BRANCH_REF"
            git -c credential.helper= -c "credential.helper=$HELPER" \
              push "https://github.com/$REPOSITORY.git" "HEAD:$BRANCH_REF"
          fi
