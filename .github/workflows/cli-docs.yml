name: Update CLI Docs

on:
  push:
    branches: [main]
    paths:
      - "fastapi_code_generator/**"
      - "tests/cli_doc/**"
      - "tests/main/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/cli-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "fastapi_code_generator/**"
      - "tests/cli_doc/**"
      - "tests/main/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/cli-docs.yml"

concurrency:
  group: docs-autoupdate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-cli-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: preflight
        run: |
          if [ -n "${{ secrets.PAT }}" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: |
          steps.preflight.outputs.has_pat == 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.PAT }}
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e cli-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Collect CLI doc metadata
        run: .tox/cli-docs/bin/pytest --collect-cli-docs -p no:xdist -q
      - name: Build CLI docs
        run: .tox/cli-docs/bin/python scripts/build_cli_docs.py
      - name: Build prompt data
        run: .tox/cli-docs/bin/python scripts/build_prompt_data.py --output fastapi_code_generator/prompt_data.py
      - name: Format generated prompt data
        run: uvx --from black==24.10.0 black --quiet fastapi_code_generator/prompt_data.py
      - name: Commit and push if changed
        if: |
          steps.preflight.outputs.has_pat == 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cli-reference.md fastapi_code_generator/prompt_data.py
          if ! git diff --staged --quiet; then
            git commit -m "docs: update CLI reference documentation

          Generated by GitHub Actions"
            git pull --rebase origin "$BRANCH_REF"
            git push
          fi
      - name: Skip auto-update when PAT is unavailable
        if: |
          steps.preflight.outputs.has_pat != 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        run: echo "PAT is required for CLI docs auto-update pushes; skipping write-back."
