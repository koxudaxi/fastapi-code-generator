name: Update CLI Docs

on:
  push:
    branches: [main]
    paths:
      - "fastapi_code_generator/**"
      - "tests/cli_doc/**"
      - "tests/main/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/cli-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "fastapi_code_generator/**"
      - "tests/cli_doc/**"
      - "tests/main/**"
      - "scripts/build_cli_docs.py"
      - "scripts/build_prompt_data.py"
      - "tox.ini"
      - "pyproject.toml"
      - ".github/workflows/cli-docs.yml"

permissions:
  contents: write

jobs:
  update-cli-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        with:
          fetch-depth: 0
      - uses: actions/checkout@v5
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.PAT || github.token }}
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.14"
      - name: Install tox
        run: uv tool install --python 3.14 tox --with tox-uv
      - name: Setup environment
        run: tox run -vv --notest --skip-missing-interpreters false -e cli-docs
        env:
          UV_PYTHON_PREFERENCE: "only-managed"
      - name: Collect CLI doc metadata
        run: .tox/cli-docs/bin/pytest --collect-cli-docs -p no:xdist -q
      - name: Build CLI docs
        run: .tox/cli-docs/bin/python scripts/build_cli_docs.py
      - name: Build prompt data
        run: .tox/cli-docs/bin/python scripts/build_prompt_data.py --output fastapi_code_generator/prompt_data.py
      - name: Commit and push if changed
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cli-reference.md fastapi_code_generator/prompt_data.py
          git diff --staged --quiet || git commit -m "docs: update CLI reference documentation

          Generated by GitHub Actions"
          git push
