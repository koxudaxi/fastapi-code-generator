openapi: 3.0.0
info:
  title: path_parameter_component_parameter_schema_reference
  version: 1.0.0
paths:
  /widgets/{widget}:
    get:
      operationId: getWidget
      parameters:
        - $ref: '#/components/parameters/WidgetParameter'
      responses:
        '200':
          description: Expected response to a valid request
components:
  parameters:
