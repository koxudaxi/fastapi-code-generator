openapi: "3.0.0"
info:
  version: 1.0.0
  title: Swagger Petstore
  license:
    name: MIT
  description: |
    This description is for testing
    multi-line
    description

servers:
  - url: http://petstore.swagger.io/v1
paths:
  /{supiOrSuci}/security-information-rg-inline:
    get:
      summary: Get authentication data for the FN-RG inline
      operationId: GetRgAuthDataInline
      tags:
        - Get Auth Data for FN-RG
      parameters:
        - name: supiOrSuci
          in: path
          description: SUPI or SUCI value
          required: true
          schema:
            type: string
        - name: plmn-id
          in: query
          description: serving PLMN ID
          content:
            application/json:
              schema:
                title: PlmnId
                type: object
                required:
                  - mcc
                  - mnc
                properties:
                  mcc:
                    type: string
                  mnc:
                    type: string
      responses:
        '200':
          description: Null response
